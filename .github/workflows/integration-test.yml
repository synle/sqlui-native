name: Test (Unit / Integration / E2E Tests)

on:
  schedule:
    - cron: "0 0 * * *" # daily, midnight UTC
  workflow_call:
    inputs:
      node_version:
        type: string
        default: "24"
      run_e2e:
        type: boolean
        default: true
      run_integration:
        type: boolean
        default: true
  workflow_dispatch:
    inputs:
      node_version:
        description: "Node.js version"
        default: "24"
      run_e2e:
        description: "Run E2E (Playwright) tests"
        type: boolean
        default: true
      run_integration:
        description: "Run integration tests"
        type: boolean
        default: true

concurrency:
  group: integration-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.playwright-browsers

jobs:
  # ---- Check if there are recent changes ----
  check:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }} # fetch latest branch tip (includes prep commits)
          fetch-depth: 0
      - name: Check for changes in the last 24 hours
        id: check
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            # Only gate on recent changes for scheduled (cron) runs
            if [ -n "$(git log --since='24 hours ago' --oneline)" ]; then
              echo "has_changes=true" >> "$GITHUB_OUTPUT"
            else
              echo "No changes in the last 24 hours, skipping."
              echo "has_changes=false" >> "$GITHUB_OUTPUT"
            fi
          else
            # Always run for push, workflow_dispatch, and workflow_call
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

  # ---- Unit Tests ----
  unit_tests:
    needs: check
    if: needs.check.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }} # fetch latest branch tip (includes prep commits)

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version || '24' }}
          cache: "npm"

      - name: Record job start time
        run: echo "JOB_START=$(date +%s)" >> $GITHUB_ENV

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run prebuild
        run: npm run prebuild

      - name: Record tests start time
        run: echo "TESTS_START=$(date +%s)" >> $GITHUB_ENV

      - name: Run unit tests
        id: tests
        run: npx vitest run --reporter=default --reporter=junit --outputFile.junit=unit-test-results.xml --coverage.enabled

      - name: Record tests end time
        if: ${{ always() }}
        run: echo "TESTS_END=$(date +%s)" >> $GITHUB_ENV

      - name: Publish unit test results
        if: ${{ always() && steps.tests.outcome != 'skipped' }}
        uses: dorny/test-reporter@v3
        with:
          name: Unit Test Results
          path: unit-test-results.xml
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

      - name: Write test summary
        if: ${{ always() && steps.tests.outcome != 'skipped' }}
        shell: bash
        run: |
          if [ "${{ steps.tests.outcome }}" = "failure" ]; then
            echo "## :x: Unit Tests Failed" >> $GITHUB_STEP_SUMMARY
          else
            echo "## :white_check_mark: Unit Tests Passed" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f unit-test-results.xml ]; then
            TOTAL=$(grep -o 'tests="[0-9]*"' unit-test-results.xml | head -1 | grep -o '[0-9]*')
            FAILURES=$(grep -o 'failures="[0-9]*"' unit-test-results.xml | head -1 | grep -o '[0-9]*')
            ERRORS=$(grep -o 'errors="[0-9]*"' unit-test-results.xml | head -1 | grep -o '[0-9]*')
            echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Total tests | ${TOTAL:-0} |" >> $GITHUB_STEP_SUMMARY
            echo "| Failures | ${FAILURES:-0} |" >> $GITHUB_STEP_SUMMARY
            echo "| Errors | ${ERRORS:-0} |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f coverage/coverage-summary.json ]; then
            echo "## :bar_chart: Code Coverage" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            STMTS=$(node -e "const c=require('./coverage/coverage-summary.json').total.statements; console.log(c.pct)")
            BRANCH=$(node -e "const c=require('./coverage/coverage-summary.json').total.branches; console.log(c.pct)")
            FUNCS=$(node -e "const c=require('./coverage/coverage-summary.json').total.functions; console.log(c.pct)")
            LINES=$(node -e "const c=require('./coverage/coverage-summary.json').total.lines; console.log(c.pct)")
            echo "| Category | Coverage |" >> $GITHUB_STEP_SUMMARY
            echo "|----------|----------|" >> $GITHUB_STEP_SUMMARY
            echo "| Statements | ${STMTS}% |" >> $GITHUB_STEP_SUMMARY
            echo "| Branches | ${BRANCH}% |" >> $GITHUB_STEP_SUMMARY
            echo "| Functions | ${FUNCS}% |" >> $GITHUB_STEP_SUMMARY
            echo "| Lines | ${LINES}% |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Record typecheck start time
        if: ${{ always() }}
        run: echo "TYPECHECK_START=$(date +%s)" >> $GITHUB_ENV

      - name: Run typecheck
        id: typecheck
        run: npm run typecheck

      - name: Record typecheck end / lint start time
        if: ${{ always() }}
        run: |
          echo "TYPECHECK_END=$(date +%s)" >> $GITHUB_ENV
          echo "LINT_START=$(date +%s)" >> $GITHUB_ENV

      - name: Run lint
        id: lint
        run: npm run lint

      - name: Record lint end time
        if: ${{ always() }}
        run: echo "LINT_END=$(date +%s)" >> $GITHUB_ENV

      - name: Summary of all checks
        if: ${{ always() }}
        shell: bash
        run: |
          format_duration() {
            local s=$1
            if [ "${s:-0}" -ge 60 ]; then
              printf "%dm %ds" $((s / 60)) $((s % 60))
            else
              printf "%ds" "${s:-0}"
            fi
          }

          JOB_END=$(date +%s)
          TESTS_DUR=$(( ${TESTS_END:-$JOB_END} - ${TESTS_START:-$JOB_END} ))
          TYPECHECK_DUR=$(( ${TYPECHECK_END:-$JOB_END} - ${TYPECHECK_START:-$JOB_END} ))
          LINT_DUR=$(( ${LINT_END:-$JOB_END} - ${LINT_START:-$JOB_END} ))
          TOTAL_DUR=$(( JOB_END - ${JOB_START:-$JOB_END} ))

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Build Checks Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result | Duration |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ steps.tests.outcome == 'success' && ':white_check_mark: Passed' || ':x: Failed' }} | $(format_duration $TESTS_DUR) |" >> $GITHUB_STEP_SUMMARY
          echo "| TypeCheck | ${{ steps.typecheck.outcome == 'success' && ':white_check_mark: Passed' || ':x: Failed' }} | $(format_duration $TYPECHECK_DUR) |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ steps.lint.outcome == 'success' && ':white_check_mark: Passed' || ':x: Failed' }} | $(format_duration $LINT_DUR) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Total** | | **$(format_duration $TOTAL_DUR)** |" >> $GITHUB_STEP_SUMMARY

  # ---- Integration Tests ----
  integration_test:
    needs: check
    if: ${{ needs.check.outputs.has_changes == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      checks: write
      contents: read
    services:
      # Relational Databases
      mysql:
        image: mysql
        env:
          MYSQL_ROOT_PASSWORD: password123!
        ports:
          - 3306:3306
      mariadb:
        image: mariadb:latest
        env:
          MARIADB_ROOT_PASSWORD: password123!
        ports:
          - 33061:3306
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "password123!"
        ports:
          - 1433:1433
      postgres:
        image: postgres
        env:
          POSTGRES_PASSWORD: password123!
        ports:
          - 5432:5432

      # NoSQL & Caching
      cassandra_v4:
        image: cassandra:4
        env:
          CASSANDRA_USERNAME: cassandra
          CASSANDRA_PASSWORD: cassandra
        ports:
          - 9042:9042
      cassandra_v2:
        image: cassandra:2
        env:
          CASSANDRA_USERNAME: cassandra
          CASSANDRA_PASSWORD: cassandra
        ports:
          - 9043:9042
      mongodb:
        image: mongo
        ports:
          - 27017:27017
      redis:
        image: redis
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }} # fetch latest branch tip (includes prep commits)

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version || '24' }}
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run prebuild
        run: npm run prebuild

      # wait for databases to be ready
      - name: Record job start time
        run: echo "JOB_START=$(date +%s)" >> $GITHUB_ENV

      - name: Wait for databases to be ready
        run: |
          echo "Waiting for databases to initialize..."
          sleep 5m  # sleep for n mins

      - name: Run Rust integration tests
        env:
          TEST_AZ_TABLE_STORAGE_CONNECTION: ${{ inputs.run_integration && secrets.TEST_AZ_TABLE_STORAGE_CONNECTION || '' }}
          TEST_AZ_COSMOSDB_CONNECTION: ${{ inputs.run_integration && secrets.TEST_AZ_COSMOSDB_CONNECTION || '' }}
          TEST_SFDC_CONNECTION: ${{ inputs.run_integration && secrets.TEST_SFDC_CONNECTION || '' }}
        working-directory: src-tauri
        run: cargo test --test adapter_integration -- --nocapture --test-threads=1

      - name: Record integration tests start time
        run: echo "TESTS_START=$(date +%s)" >> $GITHUB_ENV

      - name: Run integration tests
        id: integration_tests
        # Integration test secrets for cloud-based adapters (not containerized via Docker).
        # Each secret must be mapped here manually (one per line).
        # When adding a new cloud adapter integration test, add its secret here too.
        # SECURITY: These contain real credentials. Never log or echo these values.
        # Cloud secrets are only injected when run_integration is true (release builds).
        # When false (build-main), cloud tests self-skip via their process.env checks.
        env:
          TEST_AZ_TABLE_STORAGE_CONNECTION: ${{ inputs.run_integration && secrets.TEST_AZ_TABLE_STORAGE_CONNECTION || '' }}
          TEST_AZ_COSMOSDB_CONNECTION: ${{ inputs.run_integration && secrets.TEST_AZ_COSMOSDB_CONNECTION || '' }}
          TEST_SFDC_CONNECTION: ${{ inputs.run_integration && secrets.TEST_SFDC_CONNECTION || '' }}
        run: npx vitest run --config vitest.integration.config.ts --reporter=default --reporter=junit --outputFile.junit=integration-test-results.xml

      - name: Record integration tests end time
        if: ${{ always() }}
        run: echo "TESTS_END=$(date +%s)" >> $GITHUB_ENV

      - name: Publish integration test results
        if: ${{ always() && steps.integration_tests.outcome != 'skipped' }}
        uses: dorny/test-reporter@v3
        with:
          name: Integration Test Results
          path: integration-test-results.xml
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

      - name: Write integration test summary
        if: ${{ always() }}
        shell: bash
        run: |
          format_duration() {
            local s=$1
            if [ "${s:-0}" -ge 60 ]; then
              printf "%dm %ds" $((s / 60)) $((s % 60))
            else
              printf "%ds" "${s:-0}"
            fi
          }

          JOB_END=$(date +%s)
          TESTS_DUR=$(( ${TESTS_END:-$JOB_END} - ${TESTS_START:-$JOB_END} ))
          TOTAL_DUR=$(( JOB_END - ${JOB_START:-$JOB_END} ))

          if [ "${{ steps.integration_tests.outcome }}" = "failure" ]; then
            echo "## :x: Integration Tests Failed" >> $GITHUB_STEP_SUMMARY
          else
            echo "## :white_check_mark: Integration Tests Passed" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See the **Integration Test Results** check for per-test details." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f integration-test-results.xml ]; then
            TOTAL=$(grep -o 'tests="[0-9]*"' integration-test-results.xml | head -1 | grep -o '[0-9]*')
            FAILURES=$(grep -o 'failures="[0-9]*"' integration-test-results.xml | head -1 | grep -o '[0-9]*')
            ERRORS=$(grep -o 'errors="[0-9]*"' integration-test-results.xml | head -1 | grep -o '[0-9]*')
            echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Total tests | ${TOTAL:-0} |" >> $GITHUB_STEP_SUMMARY
            echo "| Failures | ${FAILURES:-0} |" >> $GITHUB_STEP_SUMMARY
            echo "| Errors | ${ERRORS:-0} |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Task | Duration |" >> $GITHUB_STEP_SUMMARY
          echo "|------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | $(format_duration $TESTS_DUR) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Total (incl. DB wait)** | **$(format_duration $TOTAL_DUR)** |" >> $GITHUB_STEP_SUMMARY

  # ---- E2E Tests (Playwright) ----
  e2e_test:
    needs: check
    if: ${{ needs.check.outputs.has_changes == 'true' && inputs.run_e2e == true }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version || '24' }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci || npm install

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.playwright-browsers
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build frontend for E2E
        run: npm run build

      - name: Record E2E tests start time
        run: echo "E2E_START=$(date +%s)" >> $GITHUB_ENV

      - name: Run E2E tests
        id: e2e_tests
        run: npx playwright test

      - name: Record E2E tests end time
        if: ${{ always() }}
        run: echo "E2E_END=$(date +%s)" >> $GITHUB_ENV

      - name: Upload Playwright report
        if: ${{ always() && steps.e2e_tests.outcome != 'skipped' }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
          compression-level: 0

      - name: Upload test screenshots
        if: ${{ always() && steps.e2e_tests.outcome == 'failure' }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: test-results/
          retention-days: 14
          compression-level: 0

      - name: Publish E2E test results
        if: ${{ always() && steps.e2e_tests.outcome != 'skipped' }}
        uses: dorny/test-reporter@v3
        with:
          name: E2E Test Results
          path: e2e-test-results.xml
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

      - name: Write E2E test summary
        if: ${{ always() }}
        shell: bash
        run: |
          format_duration() {
            local s=$1
            if [ "${s:-0}" -ge 60 ]; then
              printf "%dm %ds" $((s / 60)) $((s % 60))
            else
              printf "%ds" "${s:-0}"
            fi
          }

          E2E_DUR=$(( ${E2E_END:-$(date +%s)} - ${E2E_START:-$(date +%s)} ))

          if [ "${{ steps.e2e_tests.outcome }}" = "failure" ]; then
            echo "## :x: E2E Tests Failed" >> $GITHUB_STEP_SUMMARY
          else
            echo "## :white_check_mark: E2E Tests Passed" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See the **E2E Test Results** check and **playwright-report** artifact for details." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f e2e-test-results.xml ]; then
            TOTAL=$(grep -o 'tests="[0-9]*"' e2e-test-results.xml | head -1 | grep -o '[0-9]*')
            FAILURES=$(grep -o 'failures="[0-9]*"' e2e-test-results.xml | head -1 | grep -o '[0-9]*')
            ERRORS=$(grep -o 'errors="[0-9]*"' e2e-test-results.xml | head -1 | grep -o '[0-9]*')
            echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Total tests | ${TOTAL:-0} |" >> $GITHUB_STEP_SUMMARY
            echo "| Failures | ${FAILURES:-0} |" >> $GITHUB_STEP_SUMMARY
            echo "| Errors | ${ERRORS:-0} |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Task | Duration |" >> $GITHUB_STEP_SUMMARY
          echo "|------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| E2E Tests | $(format_duration $E2E_DUR) |" >> $GITHUB_STEP_SUMMARY
