name: Test (Unit / Integration Tests)

on:
  schedule:
    - cron: "0 0 * * *" # daily, midnight UTC
  workflow_dispatch:
    inputs:
      node_version:
        description: "Node.js version"
        default: "24"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  # ---- Check if there are recent changes ----
  check:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check for changes in the last 24 hours
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          elif [ -n "$(git log --since='24 hours ago' --oneline)" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "No changes in the last 24 hours, skipping."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

  # ---- Unit Tests ----
  unit_tests:
    needs: check
    if: needs.check.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version || '24' }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run prebuild
        run: npm run prebuild

      - name: Run unit tests
        id: tests
        run: npx vitest run --reporter=default --reporter=junit --outputFile.junit=unit-test-results.xml

      - name: Publish unit test results
        if: ${{ always() && steps.tests.outcome != 'skipped' }}
        uses: dorny/test-reporter@v3
        with:
          name: Unit Test Results
          path: unit-test-results.xml
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

      - name: Write test summary
        if: ${{ always() && steps.tests.outcome == 'failure' }}
        shell: bash
        run: |
          echo "## :x: Unit Tests Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f unit-test-results.xml ]; then
            TOTAL=$(grep -o 'tests="[0-9]*"' unit-test-results.xml | head -1 | grep -o '[0-9]*')
            FAILURES=$(grep -o 'failures="[0-9]*"' unit-test-results.xml | head -1 | grep -o '[0-9]*')
            ERRORS=$(grep -o 'errors="[0-9]*"' unit-test-results.xml | head -1 | grep -o '[0-9]*')
            echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Total tests | ${TOTAL:-0} |" >> $GITHUB_STEP_SUMMARY
            echo "| Failures | ${FAILURES:-0} |" >> $GITHUB_STEP_SUMMARY
            echo "| Errors | ${ERRORS:-0} |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Run typecheck
        id: typecheck
        run: npm run typecheck

      - name: Run lint
        id: lint
        run: npm run lint

      - name: Summary of all checks
        if: ${{ always() }}
        shell: bash
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Build Checks Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ steps.tests.outcome == 'success' && ':white_check_mark: Passed' || ':x: Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| TypeCheck | ${{ steps.typecheck.outcome == 'success' && ':white_check_mark: Passed' || ':x: Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ steps.lint.outcome == 'success' && ':white_check_mark: Passed' || ':x: Failed' }} |" >> $GITHUB_STEP_SUMMARY

  # ---- Integration Tests ----
  integration_test:
    needs: check
    if: needs.check.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      checks: write
      contents: read
    services:
      # Relational Databases
      mysql:
        image: mysql
        env:
          MYSQL_ROOT_PASSWORD: password123!
        ports:
          - 3306:3306
      mariadb:
        image: mariadb:latest
        env:
          MARIADB_ROOT_PASSWORD: password123!
        ports:
          - 33061:3306
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "password123!"
        ports:
          - 1433:1433
      postgres:
        image: postgres
        env:
          POSTGRES_PASSWORD: password123!
        ports:
          - 5432:5432

      # NoSQL & Caching
      cassandra_v4:
        image: cassandra:4
        env:
          CASSANDRA_USERNAME: cassandra
          CASSANDRA_PASSWORD: cassandra
        ports:
          - 9042:9042
      cassandra_v2:
        image: cassandra:2
        env:
          CASSANDRA_USERNAME: cassandra
          CASSANDRA_PASSWORD: cassandra
        ports:
          - 9043:9042
      mongodb:
        image: mongo
        ports:
          - 27017:27017
      redis:
        image: redis
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version || '24' }}
          cache: "npm"

      - run: |
          node scripts/prebuild.js
          npm ci || npm install
          node scripts/postbuild.js

      # wait for databases to be ready
      - name: Wait for databases to be ready
        run: |
          echo "Waiting for databases to initialize..."
          sleep 5m  # sleep for n mins

      - name: Run integration tests
        id: integration_tests
        # Integration test secrets for cloud-based adapters (not containerized via Docker).
        # Each secret must be mapped here manually (one per line).
        # When adding a new cloud adapter integration test, add its secret here too.
        # SECURITY: These contain real credentials. Never log or echo these values.
        env:
          TEST_AZ_TABLE_STORAGE_CONNECTION: ${{ secrets.TEST_AZ_TABLE_STORAGE_CONNECTION }}
          TEST_AZ_COSMOSDB_CONNECTION: ${{ secrets.TEST_AZ_COSMOSDB_CONNECTION }}
          TEST_SFDC_CONNECTION: ${{ secrets.TEST_SFDC_CONNECTION }}
        run: npx vitest run --config vitest.integration.config.ts --reporter=default --reporter=junit --outputFile.junit=integration-test-results.xml

      - name: Publish integration test results
        if: ${{ always() && steps.integration_tests.outcome != 'skipped' }}
        uses: dorny/test-reporter@v3
        with:
          name: Integration Test Results
          path: integration-test-results.xml
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

      - name: Write integration test summary
        if: ${{ always() }}
        shell: bash
        run: |
          if [ "${{ steps.integration_tests.outcome }}" = "failure" ]; then
            echo "## :x: Integration Tests Failed" >> $GITHUB_STEP_SUMMARY
          else
            echo "## :white_check_mark: Integration Tests Passed" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See the **Integration Test Results** check for per-test details." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f integration-test-results.xml ]; then
            TOTAL=$(grep -o 'tests="[0-9]*"' integration-test-results.xml | head -1 | grep -o '[0-9]*')
            FAILURES=$(grep -o 'failures="[0-9]*"' integration-test-results.xml | head -1 | grep -o '[0-9]*')
            ERRORS=$(grep -o 'errors="[0-9]*"' integration-test-results.xml | head -1 | grep -o '[0-9]*')
            echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Total tests | ${TOTAL:-0} |" >> $GITHUB_STEP_SUMMARY
            echo "| Failures | ${FAILURES:-0} |" >> $GITHUB_STEP_SUMMARY
            echo "| Errors | ${ERRORS:-0} |" >> $GITHUB_STEP_SUMMARY
          fi
