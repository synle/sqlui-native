name: Test (Unit / Integration Tests)

on:
  workflow_dispatch:
    inputs:
      node_version:
        description: "Node.js version"
        default: "24"

jobs:
  unit_tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: "npm"

      - run: bash scripts/test.sh

  integration_test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    services:
      # Relational Databases
      mysql:
        image: mysql
        env:
          MYSQL_ROOT_PASSWORD: password123!
        ports:
          - 3306:3306
      mariadb:
        image: mariadb:latest
        env:
          MARIADB_ROOT_PASSWORD: password123!
        ports:
          - 33061:3306
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "password123!"
        ports:
          - 1433:1433
      postgres:
        image: postgres
        env:
          POSTGRES_PASSWORD: password123!
        ports:
          - 5432:5432

      # NoSQL & Caching
      cassandra_v4:
        image: cassandra:4
        env:
          CASSANDRA_USERNAME: cassandra
          CASSANDRA_PASSWORD: cassandra
        ports:
          - 9042:9042
      cassandra_v2:
        image: cassandra:2
        env:
          CASSANDRA_USERNAME: cassandra
          CASSANDRA_PASSWORD: cassandra
        ports:
          - 9043:9042
      mongodb:
        image: mongo
        ports:
          - 27017:27017
      redis:
        image: redis
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: "npm"

      - run: |
          node scripts/prebuild.js
          npm ci || npm install
          node scripts/postbuild.js

      # wait for databases to be ready
      - name: Wait for databases to be ready
        run: |
          echo "Waiting for databases to initialize..."
          sleep 5m  # sleep for n mins

      # Export all GitHub secrets matching TEST_*_CONNECTION as env vars.
      # This auto-maps any secret like TEST_SFDC_CONNECTION, TEST_AZ_COSMOSDB_CONNECTION, etc.
      # To add a new one: GitHub repo > Settings > Secrets and variables > Actions > New repository secret.
      - name: Export TEST_ secrets as env vars
        run: |
          echo '${{ toJSON(secrets) }}' | jq -r 'to_entries[] | select(.key | startswith("TEST_") and endswith("_CONNECTION")) | .key + "\n" + .value' | while read -r key && read -r value; do
            delimiter="$(openssl rand -hex 16)"
            echo "${key}<<${delimiter}" >> "$GITHUB_ENV"
            echo "${value}" >> "$GITHUB_ENV"
            echo "${delimiter}" >> "$GITHUB_ENV"
          done

      - name: Run integration tests
        run: npm run test-integration
