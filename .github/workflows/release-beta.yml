name: Release Beta

on:
  workflow_dispatch:
    inputs:
      sha:
        description: "Commit SHA to build (defaults to HEAD)"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  BUILD_CHANNEL: beta
  ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
  ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.pre.outputs.tag }}
      sha: ${{ steps.pre.outputs.sha }}
    steps:
      - uses: synle/gha-workflows/actions/release/begin-release@main
        id: pre
        with:
          mode: beta
          project_name: sqlui-native
          sha: ${{ inputs.sha }}

  build:
    needs: [prepare]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            artifact_name: macOS (Apple Silicon ARM64)
          - platform: macos-latest
            target: x86_64-apple-darwin
            artifact_name: macOS (Intel x64)
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: Windows (x64)
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_name: Linux (x64)

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Check for Tauri project
        id: check_tauri
        shell: bash
        run: |
          if [ -f src-tauri/Cargo.toml ]; then
            echo "has_tauri=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tauri=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Cache Electron binaries
        if: steps.check_tauri.outputs.has_tauri == 'false'
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/.cache/electron
            ${{ github.workspace }}/.cache/electron-builder
          key: electron-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Setup Rust
        if: steps.check_tauri.outputs.has_tauri == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: steps.check_tauri.outputs.has_tauri == 'true' && matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libssl-dev

      - name: Install dependencies
        run: npm ci || npm install

      - name: Detect build mode
        id: detect
        shell: bash
        run: |
          if [ -f src-tauri/Cargo.toml ]; then
            echo "mode=tauri" >> "$GITHUB_OUTPUT"
          else
            echo "mode=electron" >> "$GITHUB_OUTPUT"
          fi

      # --- Tauri build path ---
      - name: Prepare sidecar resources
        if: steps.detect.outputs.mode == 'tauri'
        run: mkdir -p src-tauri/resources && npm run build:tauri

      - name: Build Tauri app
        if: steps.detect.outputs.mode == 'tauri'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.target }}

      - name: Upload Tauri artifacts to release
        if: steps.detect.outputs.mode == 'tauri'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"

          for file in \
            "$BUNDLE_DIR"/dmg/*.dmg \
            "$BUNDLE_DIR"/macos/*.app.tar.gz \
            "$BUNDLE_DIR"/nsis/*.exe \
            "$BUNDLE_DIR"/msi/*.msi \
            "$BUNDLE_DIR"/deb/*.deb \
            "$BUNDLE_DIR"/appimage/*.AppImage \
            "$BUNDLE_DIR"/rpm/*.rpm; do
            if [ -f "$file" ]; then
              echo "Uploading: $file"
              gh release upload "$TAG" "$file" --clobber
            fi
          done

      - name: Upload Tauri build artifacts
        if: steps.detect.outputs.mode == 'tauri'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/rpm/*.rpm
          retention-days: 30
          compression-level: 9
          if-no-files-found: ignore

      # --- Electron build path ---
      - name: Build Electron app
        if: steps.detect.outputs.mode == 'electron'
        shell: bash
        run: bash scripts/build.sh

      - name: Package Electron distributable
        if: steps.detect.outputs.mode == 'electron'
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "macos-latest" ] && [ "${{ matrix.target }}" = "aarch64-apple-darwin" ]; then
            npm run dist-macos-arm64
          elif [ "${{ matrix.platform }}" = "macos-latest" ] && [ "${{ matrix.target }}" = "x86_64-apple-darwin" ]; then
            npm run dist-macos-x64
          elif [ "${{ matrix.platform }}" = "windows-latest" ]; then
            npm run dist-win-x64-exe
          elif [ "${{ matrix.platform }}" = "ubuntu-22.04" ]; then
            npm run dist-linux-deb
          fi

      - name: Upload Electron artifacts to release
        if: steps.detect.outputs.mode == 'electron'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          for file in dist/*.dmg dist/*.exe dist/*.deb dist/*.rpm dist/*.AppImage dist/*.snap; do
            if [ -f "$file" ]; then
              echo "Uploading: $file"
              gh release upload "$TAG" "$file" --clobber
            fi
          done

      - name: Upload Electron build artifacts
        if: steps.detect.outputs.mode == 'electron'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/*.dmg
            dist/*.exe
            dist/*.deb
            dist/*.rpm
            dist/*.AppImage
          retention-days: 30
          compression-level: 9
          if-no-files-found: ignore

  finalize:
    needs: [prepare, build]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: synle/gha-workflows/actions/release/end-release@main
        with:
          tag: ${{ needs.prepare.outputs.tag }}
          project_name: sqlui-native
          mode: beta
          build_result: ${{ needs.build.result }}
          sha: ${{ needs.prepare.outputs.sha }}
