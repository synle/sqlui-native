name: Cleanup Artifacts (PR Closed)

on:
  pull_request:
    types: [closed]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cleanup:
    # https://github.com/synle/workflows/blob/main/.github/workflows/cleanup-pr-artifacts.yml
    uses: synle/workflows/.github/workflows/cleanup-pr-artifacts.yml@main
    permissions:
      actions: write
    with:
      delete-runs: false
