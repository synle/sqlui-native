name: Cleanup PR Artifacts

on:
  pull_request:
    types: [closed]

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Delete artifacts from this PR's workflow runs
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const headSha = context.payload.pull_request.head.sha;
            const branch = context.payload.pull_request.head.ref;

            console.log(`Cleaning up artifacts for PR #${context.issue.number} (${branch})`);

            // Find workflow runs for this PR's branch
            const runs = await github.rest.actions.listWorkflowRunsForRepo({
              owner, repo,
              branch,
              per_page: 20,
            });

            let deleted = 0;
            for (const run of runs.data.workflow_runs) {
              const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
                owner, repo,
                run_id: run.id,
              });

              for (const artifact of artifacts.data.artifacts) {
                try {
                  await github.rest.actions.deleteArtifact({ owner, repo, artifact_id: artifact.id });
                  console.log(`Deleted: ${artifact.name} (run ${run.id})`);
                  deleted++;
                } catch (err) {
                  console.log(`Skip: ${artifact.name} — ${err.message}`);
                }
              }
            }

            console.log(`Deleted ${deleted} artifacts total`);
