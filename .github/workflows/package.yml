  roll_back_on_failure_or_canceled:
    if: ${{ always() && inputs.release_mode == 'production' && needs.create_release.result == 'success' && (needs.tests.result == 'failure' || needs.dist_windows_x64.result == 'failure' || needs.dist_windows_arm64.result == 'failure' || needs.dist_macos_arm64.result == 'failure' || needs.dist_macos_intel_x64.result == 'failure' || needs.dist_linux_deb.result == 'failure' || needs.dist_linux_rpm.result == 'failure' || needs.dist_linux_snap.result == 'failure' || needs.dist_linux_pacman.result == 'failure' || needs.dist_linux_appimage.result == 'failure' || needs.tests.result == 'cancelled' || needs.dist_windows_x64.result == 'cancelled' || needs.dist_windows_arm64.result == 'cancelled' || needs.dist_macos_arm64.result == 'cancelled' || needs.dist_macos_intel_x64.result == 'cancelled' || needs.dist_linux_deb.result == 'cancelled' || needs.dist_linux_rpm.result == 'cancelled' || needs.dist_linux_snap.result == 'cancelled' || needs.dist_linux_pacman.result == 'cancelled' || needs.dist_linux_appimage.result == 'cancelled') }}
    needs: [create_release, tests, dist_windows_x64, dist_windows_arm64, dist_macos_arm64, dist_macos_intel_x64, dist_linux_deb, dist_linux_rpm, dist_linux_snap, dist_linux_pacman, dist_linux_appimage]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }} # fetch latest branch tip (includes prep commits)

      - name: Check release completeness and rollback if needed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ needs.create_release.outputs.dist_version }}"
          JOB_FAILED=${{ needs.tests.result == 'failure' || needs.dist_windows_x64.result == 'failure' || needs.dist_windows_arm64.result == 'failure' || needs.dist_macos_arm64.result == 'failure' || needs.dist_macos_intel_x64.result == 'failure' || needs.dist_linux_deb.result == 'failure' || needs.dist_linux_rpm.result == 'failure' || needs.dist_linux_snap.result == 'failure' || needs.dist_linux_pacman.result == 'failure' || needs.dist_linux_appimage.result == 'failure' || needs.tests.result == 'cancelled' || needs.dist_windows_x64.result == 'cancelled' || needs.dist_windows_arm64.result == 'cancelled' || needs.dist_macos_arm64.result == 'cancelled' || needs.dist_macos_intel_x64.result == 'cancelled' || needs.dist_linux_deb.result == 'cancelled' || needs.dist_linux_rpm.result == 'cancelled' || needs.dist_linux_snap.result == 'cancelled' || needs.dist_linux_pacman.result == 'cancelled' || needs.dist_linux_appimage.result == 'cancelled' }}

          if [ "$JOB_FAILED" = "true" ]; then
            echo "::warning::Release $TAG has failing jobs — deleting"
            gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true
            echo "ROLLED_BACK=true" >> $GITHUB_ENV
          elif [ "${{ inputs.release_mode }}" = "production" ]; then
            ASSET_COUNT=$(gh release view "$TAG" --json assets --jq '.assets | length' 2>/dev/null || echo "0")
            echo "Release $TAG has $ASSET_COUNT/$EXPECTED_RELEASE_ASSETS assets"
            if [ "$ASSET_COUNT" -lt "$EXPECTED_RELEASE_ASSETS" ]; then
              echo "::warning::Release $TAG is incomplete ($ASSET_COUNT/$EXPECTED_RELEASE_ASSETS assets) — deleting"
              gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true
              echo "ROLLED_BACK=true" >> $GITHUB_ENV
            else
              echo "Release $TAG is complete"
              echo "ROLLED_BACK=false" >> $GITHUB_ENV
            fi
          else
            echo "Release $TAG — skipping asset count check (non-production mode)"
            echo "ROLLED_BACK=false" >> $GITHUB_ENV
          fi

      - name: Rollback job summary
        if: ${{ always() }}
        shell: bash
        run: |
          echo "## :rewind: Release Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$ROLLED_BACK" = "true" ]; then
            echo "Rolled back release **${{ needs.create_release.outputs.dist_version }}** due to missing assets or job failure." >> $GITHUB_STEP_SUMMARY
          else
            echo "Release **${{ needs.create_release.outputs.dist_version }}** is complete with all expected assets." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Fail pipeline on rollback
        shell: bash
        run: |
          echo "::error::Release rolled back due to dist job failure or cancellation — failing the pipeline."
          exit 1

  publish:
    if: ${{ always() && inputs.release_mode == 'production' && needs.roll_back_on_failure_or_canceled.result == 'skipped' }}
    needs: [create_release, roll_back_on_failure_or_canceled, tests, dist_windows_x64, dist_windows_arm64, dist_macos_arm64, dist_macos_intel_x64, dist_linux_deb, dist_linux_rpm, dist_linux_snap, dist_linux_pacman, dist_linux_appimage]
    runs-on: ubuntu-latest
    steps:
      - name: Record job start time
        run: echo "JOB_START=$(date +%s)" >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }} # fetch latest branch tip (includes prep commits)

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: "npm"


      - name: Publish release (un-draft and mark as latest)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ needs.create_release.outputs.dist_version }}"
          echo "Publishing release $TAG as official latest..."
          gh release edit "$TAG" --draft=false --latest
          echo "Release $TAG is now published and marked as latest"

      - name: Commit release version
        uses: EndBug/add-and-commit@v9
        with:
          message: "CI / CD - New Release ${{ needs.create_release.outputs.dist_version }}"
          default_author: github_actions

      - name: Publish job summary
        if: ${{ always() }}
        shell: bash
        run: |
          JOB_END=$(date +%s)
          DUR=$(( JOB_END - ${JOB_START:-$JOB_END} ))
          if [ "$DUR" -ge 60 ]; then FORMATTED=$(printf "%dm %ds" $((DUR / 60)) $((DUR % 60))); else FORMATTED="${DUR}s"; fi
          echo "## :bookmark: Publish Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | ${{ needs.create_release.outputs.dist_version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Total Duration** | **${FORMATTED}** |" >> $GITHUB_STEP_SUMMARY

  deploy_github_pages:
    if: ${{ always() && inputs.release_mode == 'production' && needs.publish.result == 'success' }}
    needs: [publish]
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Record job start time
        run: echo "JOB_START=$(date +%s)" >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }} # fetch latest branch tip (includes prep commits)

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Deploy job summary
        if: ${{ always() }}
        shell: bash
        run: |
          JOB_END=$(date +%s)
          DUR=$(( JOB_END - ${JOB_START:-$JOB_END} ))
          if [ "$DUR" -ge 60 ]; then FORMATTED=$(printf "%dm %ds" $((DUR / 60)) $((DUR % 60))); else FORMATTED="${DUR}s"; fi
          echo "## :globe_with_meridians: Deploy GitHub Pages Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Total Duration** | **${FORMATTED}** |" >> $GITHUB_STEP_SUMMARY
