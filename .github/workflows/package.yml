name: Package

on:
  workflow_call:
    inputs:
      node_version:
        type: string
        default: "24"
        description: "Node.js version"
      release_mode:
        type: string
        default: "no_release"
        description: "Release mode: draft, production, or no_release"
      run_format:
        type: boolean
        default: false
        description: "Whether to run code formatting and commit"
      draft_keep_count:
        type: number
        default: 5
        description: "Number of most recent draft releases to keep during cleanup"
      release_notes:
        type: string
        default: ""
        description: "Release notes for the GitHub release"
    secrets:
      TOKEN:
        required: false
    outputs:
      dist_version:
        value: ${{ jobs.create_release.outputs.dist_version }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  code_format:
    runs-on: ubuntu-latest
    steps:
      - name: Print input parameters
        shell: bash
        run: |
          echo "node_version: ${{ inputs.node_version }}"
          echo "release_mode: ${{ inputs.release_mode }}"
          echo "run_format: ${{ inputs.run_format }}"

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: "npm"

      - name: Run code formatting
        run: bash scripts/format.sh

      - name: Commit formatting changes
        if: ${{ inputs.run_format }}
        id: commit
        uses: EndBug/add-and-commit@v9
        with:
          message: "CI / CD - Format code"
          default_author: github_actions

  create_release:
    if: ${{ inputs.release_mode != 'no_release' }}
    needs: [code_format]
    runs-on: ubuntu-latest
    outputs:
      dist_version: ${{ steps.package-version.outputs.current-version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: "npm"

      - name: Stamp version (${{ inputs.release_mode }})
        shell: bash
        run: |
          echo "::group::Version stamp - release_mode=${{ inputs.release_mode }}"
          if [ "${{ inputs.release_mode }}" = "production" ]; then
            npm run version-stamp:release
          else
            npm run version-stamp:draft
          fi
          echo "::endgroup::"

      - name: Get package version
        id: package-version
        uses: martinbeentjes/npm-get-version-action@master
        with:
          path: "."

      - name: Delete existing tag and release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ steps.package-version.outputs.current-version }}"
          echo "Deleting existing release and tag for $TAG (if any)..."
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ steps.package-version.outputs.current-version }}"
          DRAFT_FLAGS=""
          if [ "${{ inputs.release_mode }}" = "draft" ]; then
            DRAFT_FLAGS="--draft --prerelease"
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "Release $TAG
          ${{ inputs.release_notes }}" \
            $DRAFT_FLAGS

      - name: Cleanup old draft releases
        if: ${{ inputs.release_mode == 'draft' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          echo "Cleaning up old draft releases, keeping the last ${{ inputs.draft_keep_count }}..."
          gh release list --json tagName,isDraft --limit 100 | \
            jq -r '[.[] | select(.isDraft == true)] | sort_by(.tagName) | reverse | .[${{ inputs.draft_keep_count }}:] | .[].tagName' | \
            while read -r tag; do
              echo "Deleting old draft release: $tag"
              gh release delete "$tag" --yes --cleanup-tag || true
            done

  prebuild:
    needs: [code_format]
    runs-on: ubuntu-latest
    name: Build, Smoke Test and Code Format
    permissions:
      checks: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run prebuild
        run: npm run prebuild

      - name: Run unit tests
        id: tests
        continue-on-error: ${{ inputs.release_mode == 'draft' }}
        run: npx vitest run --reporter=default --reporter=junit --outputFile.junit=test-results.xml

      - name: Publish test results
        if: ${{ always() && steps.tests.outcome != 'skipped' }}
        uses: dorny/test-reporter@v3
        with:
          name: Unit Test Results
          path: test-results.xml
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

      - name: Write test summary
        if: ${{ always() && steps.tests.outcome == 'failure' }}
        shell: bash
        run: |
          echo "## :x: Unit Tests Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Some unit tests failed during this build. See the **Unit Test Results** check for details." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f test-results.xml ]; then
            TOTAL=$(grep -o 'tests="[0-9]*"' test-results.xml | head -1 | grep -o '[0-9]*')
            FAILURES=$(grep -o 'failures="[0-9]*"' test-results.xml | head -1 | grep -o '[0-9]*')
            ERRORS=$(grep -o 'errors="[0-9]*"' test-results.xml | head -1 | grep -o '[0-9]*')
            echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Total tests | ${TOTAL:-0} |" >> $GITHUB_STEP_SUMMARY
            echo "| Failures | ${FAILURES:-0} |" >> $GITHUB_STEP_SUMMARY
            echo "| Errors | ${ERRORS:-0} |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Run typecheck
        id: typecheck
        continue-on-error: ${{ inputs.release_mode == 'draft' }}
        run: npm run typecheck

      - name: Run lint
        id: lint
        continue-on-error: ${{ inputs.release_mode == 'draft' }}
        run: npm run lint

      - name: Summary of all checks
        if: ${{ always() }}
        shell: bash
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Build Checks Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ steps.tests.outcome == 'success' && ':white_check_mark: Passed' || ':x: Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| TypeCheck | ${{ steps.typecheck.outcome == 'success' && ':white_check_mark: Passed' || ':x: Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ steps.lint.outcome == 'success' && ':white_check_mark: Passed' || ':x: Failed' }} |" >> $GITHUB_STEP_SUMMARY

  dist_windows_x64:
    needs: [prebuild, create_release]
    if: ${{ always() && needs.prebuild.result == 'success' }}
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: "npm"

      - name: Update package.json to release version
        run: npm version --no-git-tag-version "${{ needs.create_release.outputs.dist_version }}"

      - name: Build application
        run: bash scripts/build.sh

      - name: Package Windows x64 exe
        shell: bash
        run: |
          npm run dist-win-x64-exe
          ls -R ./dist

      - name: Upload x64 exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windows 10 - 11 (Intel - AMD x64).exe
          path: ./dist/sqlui-native-x64.exe
          compression-level: 9

      - name: Upload x64 exe to release
        if: ${{ needs.create_release.outputs.dist_version != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload "${{ needs.create_release.outputs.dist_version }}" \
            "./dist/sqlui-native-x64.exe#sqlui-native-${{ needs.create_release.outputs.dist_version }}-x64.exe" \
            --clobber

      - name: Package Windows x64 appx
        shell: bash
        run: |
          npm run dist-win-x64-appx
          ls -R ./dist

      - name: Upload x64 appx artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windows 10 - 11 (Intel - AMD x64).appx
          path: ./dist/sqlui-native-x64.appx
          compression-level: 9

      - name: Upload x64 appx to release
        if: ${{ needs.create_release.outputs.dist_version != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload "${{ needs.create_release.outputs.dist_version }}" \
            "./dist/sqlui-native-x64.appx#sqlui-native-${{ needs.create_release.outputs.dist_version }}-x64.appx" \
            --clobber

  dist_windows_arm64:
    needs: [prebuild, create_release]
    if: ${{ always() && needs.prebuild.result == 'success' }}
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: "npm"

      - name: Install setuptools for node-gyp
        run: pip install setuptools

      - name: Update package.json to release version
        run: npm version --no-git-tag-version "${{ needs.create_release.outputs.dist_version }}"

      - name: Build application
        run: bash scripts/build.sh

      - name: Package Windows ARM64 exe
        shell: bash
        run: |
          npm run dist-win-arm64
          ls -R ./dist

      - name: Upload ARM64 exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windows 10 - 11 (ARM architecture).exe
          path: ./dist/sqlui-native-arm64.exe
          compression-level: 9

      - name: Upload ARM64 exe to release
        if: ${{ needs.create_release.outputs.dist_version != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload "${{ needs.create_release.outputs.dist_version }}" \
            "./dist/sqlui-native-arm64.exe#sqlui-native-${{ needs.create_release.outputs.dist_version }}-arm64.exe" \
            --clobber

  dist_macos_arm64:
    needs: [prebuild, create_release]
    if: ${{ always() && needs.prebuild.result == 'success' }}
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: "npm"

      - name: Update package.json to release version
        run: npm version --no-git-tag-version "${{ needs.create_release.outputs.dist_version }}"

      - name: Build application
        run: bash scripts/build.sh

      - name: Package macOS ARM64 dmg
        shell: bash
        run: |
          npm run dist-macos-arm64
          ls -R ./dist

      - name: Upload ARM64 dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: macOS - OSX (Apple Silicon M-Series).dmg
          path: ./dist/sqlui-native-arm64.dmg
          compression-level: 9

      - name: Upload ARM64 dmg to release
        if: ${{ needs.create_release.outputs.dist_version != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload "${{ needs.create_release.outputs.dist_version }}" \
            "./dist/sqlui-native-arm64.dmg#sqlui-native-${{ needs.create_release.outputs.dist_version }}-arm64.dmg" \
            --clobber

  dist_macos_intel_x64:
    needs: [prebuild, create_release]
    if: ${{ always() && needs.prebuild.result == 'success' }}
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: "npm"

      - name: Update package.json to release version
        run: npm version --no-git-tag-version "${{ needs.create_release.outputs.dist_version }}"

      - name: Build application
        run: bash scripts/build.sh

      - name: Package macOS x64 dmg
        shell: bash
        run: |
          npm run dist-macos-x64
          ls -R ./dist

      - name: Upload x64 dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: macOS - OSX (Intel x64).dmg
          path: ./dist/sqlui-native-x64.dmg
          compression-level: 9

      - name: Upload x64 dmg to release
        if: ${{ needs.create_release.outputs.dist_version != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload "${{ needs.create_release.outputs.dist_version }}" \
            "./dist/sqlui-native-x64.dmg#sqlui-native-${{ needs.create_release.outputs.dist_version }}-x64.dmg" \
            --clobber

  dist_linux:
    needs: [prebuild, create_release]
    if: ${{ always() && needs.prebuild.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: "npm"

      - name: Update package.json to release version
        run: npm version --no-git-tag-version "${{ needs.create_release.outputs.dist_version }}"

      - name: Build application
        run: bash scripts/build.sh

      - name: Package Linux distributables
        shell: bash
        run: |
          npm run dist
          npm run dist-linux-appimage
          ls -R ./dist

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: Linux - Debian Ubuntu.deb
          path: ./dist/sqlui-native.deb
          compression-level: 9

      - name: Upload deb to release
        if: ${{ needs.create_release.outputs.dist_version != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload "${{ needs.create_release.outputs.dist_version }}" \
            "./dist/sqlui-native.deb#sqlui-native-${{ needs.create_release.outputs.dist_version }}.deb" \
            --clobber

      - name: Upload rpm artifact
        uses: actions/upload-artifact@v4
        with:
          name: Linux - Redhat CentOS Fedora.rpm
          path: ./dist/sqlui-native.rpm
          compression-level: 9

      - name: Upload rpm to release
        if: ${{ needs.create_release.outputs.dist_version != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload "${{ needs.create_release.outputs.dist_version }}" \
            "./dist/sqlui-native.rpm#sqlui-native-${{ needs.create_release.outputs.dist_version }}.rpm" \
            --clobber

      - name: Upload snap artifact
        uses: actions/upload-artifact@v4
        with:
          name: Linux - Ubuntu.snap
          path: ./dist/sqlui-native.snap
          compression-level: 9

      - name: Upload snap to release
        if: ${{ needs.create_release.outputs.dist_version != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload "${{ needs.create_release.outputs.dist_version }}" \
            "./dist/sqlui-native.snap#sqlui-native-${{ needs.create_release.outputs.dist_version }}.snap" \
            --clobber

      - name: Upload pacman artifact
        uses: actions/upload-artifact@v4
        with:
          name: Linux - Arch.pacman
          path: ./dist/sqlui-native.pacman
          compression-level: 9

      - name: Upload pacman to release
        if: ${{ needs.create_release.outputs.dist_version != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload "${{ needs.create_release.outputs.dist_version }}" \
            "./dist/sqlui-native.pacman#sqlui-native-${{ needs.create_release.outputs.dist_version }}.pacman" \
            --clobber

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: Linux.AppImage
          path: ./dist/sqlui-native.AppImage
          compression-level: 9

      - name: Upload AppImage to release
        if: ${{ needs.create_release.outputs.dist_version != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload "${{ needs.create_release.outputs.dist_version }}" \
            "./dist/sqlui-native.AppImage#sqlui-native-${{ needs.create_release.outputs.dist_version }}.AppImage" \
            --clobber

  roll_back_on_failure_or_canceled:
    if: ${{ always() && inputs.release_mode != 'no_release' && needs.create_release.result == 'success' && (needs.dist_windows_x64.result == 'failure' || needs.dist_windows_arm64.result == 'failure' || needs.dist_macos_arm64.result == 'failure' || needs.dist_macos_intel_x64.result == 'failure' || needs.dist_linux.result == 'failure' || needs.dist_windows_x64.result == 'cancelled' || needs.dist_windows_arm64.result == 'cancelled' || needs.dist_macos_arm64.result == 'cancelled' || needs.dist_macos_intel_x64.result == 'cancelled' || needs.dist_linux.result == 'cancelled') }}
    needs: [create_release, dist_windows_x64, dist_windows_arm64, dist_macos_arm64, dist_macos_intel_x64, dist_linux]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Delete failed release tag and assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ needs.create_release.outputs.dist_version }}"
          echo "Deleting failed release: $TAG"
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true

  publish:
    if: ${{ inputs.release_mode == 'production' }}
    needs: [create_release, dist_windows_x64, dist_windows_arm64, dist_macos_arm64, dist_macos_intel_x64, dist_linux]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: "npm"

      - name: Update package.json to release version
        run: npm version --no-git-tag-version "${{ needs.create_release.outputs.dist_version }}"

      - name: Write release version file
        shell: bash
        run: |
          echo "{ \"version\": \"${{ needs.create_release.outputs.dist_version }}\" }" > release.json

      - name: Commit release version
        uses: EndBug/add-and-commit@v9
        with:
          message: "CI / CD - New Release ${{ needs.create_release.outputs.dist_version }}"
          default_author: github_actions

  deploy_github_pages:
    if: ${{ inputs.release_mode == 'production' }}
    needs: [publish]
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Copy release.json into site
        shell: bash
        run: |
          cp release.json _site/ 2>/dev/null || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
