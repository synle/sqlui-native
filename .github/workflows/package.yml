name: Package

on:
  workflow_call:
    inputs:
      node_version:
        type: string
        default: "24"
        description: "Node.js version"
      release_mode:
        type: string
        default: "no_release"
        description: "Release mode: draft, production, or no_release"
      run_format:
        type: boolean
        default: false
        description: "Whether to run code formatting and commit"
      release_notes:
        type: string
        default: ""
        description: "Release notes for the GitHub release"
      run_integration:
        type: boolean
        default: true
        description: "Whether to run integration tests"
    secrets:
      TOKEN:
        required: false
    outputs:
      dist_version:
        value: ${{ jobs.create_release.outputs.dist_version }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  EXPECTED_RELEASE_ASSETS: 10

jobs:
  code_format:
    runs-on: ubuntu-latest
    steps:
      - name: Record job start time
        run: echo "JOB_START=$(date +%s)" >> $GITHUB_ENV

      - name: Print input parameters
        shell: bash
        run: |
          echo "node_version: ${{ inputs.node_version }}"
          echo "release_mode: ${{ inputs.release_mode }}"
          echo "run_format: ${{ inputs.run_format }}"

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: "npm"

      - name: Run code formatting
        run: bash scripts/format.sh

      - name: Commit formatting changes
        if: ${{ inputs.run_format }}
        id: commit
        uses: EndBug/add-and-commit@v9
        with:
          message: "CI / CD - Format code"
          default_author: github_actions

      - name: Code format job summary
        if: ${{ always() }}
        shell: bash
        run: |
          JOB_END=$(date +%s)
          DUR=$(( JOB_END - ${JOB_START:-$JOB_END} ))
          if [ "$DUR" -ge 60 ]; then FORMATTED=$(printf "%dm %ds" $((DUR / 60)) $((DUR % 60))); else FORMATTED="${DUR}s"; fi
          echo "## :art: Code Format Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Total Duration** | **${FORMATTED}** |" >> $GITHUB_STEP_SUMMARY

  create_release:
    if: ${{ inputs.release_mode != 'no_release' }}
    needs: [code_format]
    runs-on: ubuntu-latest
    outputs:
      dist_version: ${{ steps.package-version.outputs.current-version }}
    steps:
      - name: Record job start time
        run: echo "JOB_START=$(date +%s)" >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }} # fetch latest branch tip (includes prep commits)

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: "npm"

      - name: Stamp version (${{ inputs.release_mode }})
        shell: bash
        run: |
          echo "::group::Version stamp - release_mode=${{ inputs.release_mode }}"
          if [ "${{ inputs.release_mode }}" = "production" ]; then
            npm run version-stamp:release
          else
            npm run version-stamp:draft
          fi
          echo "::endgroup::"

      - name: Get package version
        id: package-version
        uses: martinbeentjes/npm-get-version-action@master
        with:
          path: "."

      - name: Delete existing tag and release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ steps.package-version.outputs.current-version }}"
          echo "Deleting existing release and tag for $TAG (if any)..."
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ steps.package-version.outputs.current-version }}"
          DRAFT_FLAGS=""
          if [ "${{ inputs.release_mode }}" = "draft" ]; then
            DRAFT_FLAGS="--draft --prerelease"
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "Release $TAG
          ${{ inputs.release_notes }}" \
            $DRAFT_FLAGS

      - name: Create release job summary
        if: ${{ always() }}
        shell: bash
        run: |
          JOB_END=$(date +%s)
          DUR=$(( JOB_END - ${JOB_START:-$JOB_END} ))
          if [ "$DUR" -ge 60 ]; then FORMATTED=$(printf "%dm %ds" $((DUR / 60)) $((DUR % 60))); else FORMATTED="${DUR}s"; fi
          echo "## :rocket: Create Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Total Duration** | **${FORMATTED}** |" >> $GITHUB_STEP_SUMMARY

  dist_windows_x64:
    needs: [code_format, create_release]
    if: ${{ always() && needs.code_format.result == 'success' }}
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }} # fetch latest branch tip (includes prep commits)

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: "npm"

      - name: Setup Python for node-gyp
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install setuptools for node-gyp
        run: python -m pip install setuptools

      - name: Update package.json to release version
        run: npm version --no-git-tag-version "${{ needs.create_release.outputs.dist_version }}"

      - name: Record build start time
        run: echo "BUILD_START=$(date +%s)" >> $GITHUB_ENV

      - name: Build application
        run: bash scripts/build.sh

      - name: Install Playwright browsers for smoke test
        run: npx playwright install --with-deps chromium

      - name: Run smoke test
        run: npm run test-smoke

      - name: Record build end / package start time
        if: ${{ always() }}
        shell: bash
        run: |
          echo "BUILD_END=$(date +%s)" >> $GITHUB_ENV
          echo "PACKAGE_START=$(date +%s)" >> $GITHUB_ENV

      - name: Package Windows x64 exe
        shell: bash
        run: |
          npm run dist-win-x64-exe
          ls -R ./dist

      - name: Upload x64 exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windows 10 - 11 (Intel - AMD x64).exe
          path: ./dist/sqlui-native-x64.exe
          compression-level: 9

      - name: Upload x64 exe to release
        if: ${{ needs.create_release.outputs.dist_version != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload "${{ needs.create_release.outputs.dist_version }}" \
            "./dist/sqlui-native-x64.exe#sqlui-native-${{ needs.create_release.outputs.dist_version }}-x64.exe" \
            --clobber

      - name: Package Windows x64 appx
        shell: bash
        run: |
          npm run dist-win-x64-appx
          ls -R ./dist

      - name: Upload x64 appx artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windows 10 - 11 (Intel - AMD x64).appx
          path: ./dist/sqlui-native-x64.appx
          compression-level: 9

      - name: Upload x64 appx to release
        if: ${{ needs.create_release.outputs.dist_version != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload "${{ needs.create_release.outputs.dist_version }}" \
            "./dist/sqlui-native-x64.appx#sqlui-native-${{ needs.create_release.outputs.dist_version }}-x64.appx" \
            --clobber

      - name: Windows x64 job summary
        if: ${{ always() }}
        shell: bash
        run: |
          format_duration() {
            local s=$1
            if [ "${s:-0}" -ge 60 ]; then printf "%dm %ds" $((s / 60)) $((s % 60)); else printf "%ds" "${s:-0}"; fi
          }
          JOB_END=$(date +%s)
          BUILD_DUR=$(( ${BUILD_END:-$JOB_END} - ${BUILD_START:-$JOB_END} ))
          PACKAGE_DUR=$(( JOB_END - ${PACKAGE_START:-$JOB_END} ))
          TOTAL_DUR=$(( JOB_END - ${BUILD_START:-$JOB_END} ))
          echo "## :package: Windows x64 Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Task | Duration |" >> $GITHUB_STEP_SUMMARY
          echo "|------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build | $(format_duration $BUILD_DUR) |" >> $GITHUB_STEP_SUMMARY
          echo "| Package + Upload | $(format_duration $PACKAGE_DUR) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Total** | **$(format_duration $TOTAL_DUR)** |" >> $GITHUB_STEP_SUMMARY

  dist_windows_arm64:
