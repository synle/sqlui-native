        shell: bash
        run: |
          echo "BUILD_END=$(date +%s)" >> $GITHUB_ENV
          echo "PACKAGE_START=$(date +%s)" >> $GITHUB_ENV

      - name: Package Linux deb
        shell: bash
        run: npm run dist-linux-deb || true

      - name: Package Linux rpm
        shell: bash
        run: npm run dist-linux-rpm || true

      - name: Package Linux snap
        shell: bash
        run: npm run dist-linux-snap || true

      - name: Package Linux pacman
        shell: bash
        run: npm run dist-linux-pacman || true

      - name: Package Linux AppImage
        shell: bash
        run: npm run dist-linux-appimage || true

      - name: List dist output
        shell: bash
        run: ls -R ./dist

      - name: Verify at least one Linux artifact was produced
        shell: bash
        run: |
          if [ ! -f ./dist/sqlui-native.deb ] && [ ! -f ./dist/sqlui-native.rpm ] && \
             [ ! -f ./dist/sqlui-native.snap ] && [ ! -f ./dist/sqlui-native.pacman ] && \
             [ ! -f ./dist/sqlui-native.AppImage ]; then
            echo "::error::No Linux artifacts were produced"
            exit 1
          fi

      - name: Upload deb artifact
        if: ${{ hashFiles('./dist/sqlui-native.deb') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: Linux - Debian Ubuntu.deb
          path: ./dist/sqlui-native.deb
          compression-level: 9

      - name: Upload deb to release
        if: ${{ needs.create_release.outputs.dist_version != '' && hashFiles('./dist/sqlui-native.deb') != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload "${{ needs.create_release.outputs.dist_version }}" \
            "./dist/sqlui-native.deb#sqlui-native-${{ needs.create_release.outputs.dist_version }}.deb" \
            --clobber

      - name: Upload rpm artifact
        if: ${{ hashFiles('./dist/sqlui-native.rpm') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: Linux - Redhat CentOS Fedora.rpm
          path: ./dist/sqlui-native.rpm
          compression-level: 9

      - name: Upload rpm to release
