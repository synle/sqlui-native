name: Package

on:
  workflow_call:
    inputs:
      node_version:
        type: string
        default: "24"
        description: "Node.js version"
      release_mode:
        type: string
        default: "no_release"
        description: "Release mode: draft, production, or no_release"
      run_format:
        type: boolean
        default: false
        description: "Whether to run code formatting and commit"
      release_notes:
        type: string
        default: ""
        description: "Release notes for the GitHub release"
      run_integration:
        type: boolean
        default: true
        description: "Whether to run integration tests"
    secrets:
      TOKEN:
        required: false
    outputs:
      dist_version:
        value: ${{ jobs.create_release.outputs.dist_version }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  EXPECTED_RELEASE_ASSETS: 5
  PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.playwright-browsers
  BUILD_CHANNEL: production

jobs:
  code_format:
    runs-on: ubuntu-latest
    steps:
      - name: Record job start time
        run: echo "JOB_START=$(date +%s)" >> $GITHUB_ENV

      - name: Print input parameters
        shell: bash
        run: |
          echo "node_version: ${{ inputs.node_version }}"
          echo "release_mode: ${{ inputs.release_mode }}"
          echo "run_format: ${{ inputs.run_format }}"

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: "npm"

      - name: Run code formatting
        run: bash scripts/format.sh

      - name: Commit formatting changes
        if: ${{ inputs.run_format }}
        id: commit
        uses: EndBug/add-and-commit@v9
        with:
          message: "CI / CD - Format code"
          default_author: github_actions

      - name: Code format job summary
        if: ${{ always() }}
        shell: bash
        run: |
          JOB_END=$(date +%s)
          DUR=$(( JOB_END - ${JOB_START:-$JOB_END} ))
          if [ "$DUR" -ge 60 ]; then FORMATTED=$(printf "%dm %ds" $((DUR / 60)) $((DUR % 60))); else FORMATTED="${DUR}s"; fi
          echo "## :art: Code Format Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Total Duration** | **${FORMATTED}** |" >> $GITHUB_STEP_SUMMARY

  create_release:
    if: ${{ inputs.release_mode != 'no_release' }}
    needs: [code_format]
    runs-on: ubuntu-latest
    outputs:
      dist_version: ${{ steps.package-version.outputs.current-version }}
    steps:
      - name: Record job start time
        run: echo "JOB_START=$(date +%s)" >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: "npm"

      - name: Get package version
        id: package-version
        uses: martinbeentjes/npm-get-version-action@master
        with:
          path: "."

      - name: Delete existing tag and release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ steps.package-version.outputs.current-version }}"
          echo "Deleting existing release and tag for $TAG (if any)..."
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ steps.package-version.outputs.current-version }}"
          # Always create as draft first; the publish job promotes it on success
          DRAFT_FLAGS="--draft"
          if [ "${{ inputs.release_mode }}" = "draft" ]; then
            DRAFT_FLAGS="--draft --prerelease"
          fi

          # Find the previous release tag for changelog
          PREV_TAG=$(gh release list --limit 20 --json tagName,isDraft --jq '[.[] | select(.isDraft == false) | .tagName] | .[0] // empty' 2>/dev/null || true)

          # Build release notes
          NOTES=""

          # 1. User-provided notes at the top
          USER_NOTES="${{ inputs.release_notes }}"
          if [ -n "$USER_NOTES" ]; then
            NOTES="${USER_NOTES}

          "
          fi

          # 2. Changelog from commits (top 10, with link to full diff)
          CURRENT_SHA=$(git rev-parse HEAD)
          if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "$TAG" ]; then
            TOTAL_COMMITS=$(git rev-list --count --no-merges "${PREV_TAG}..HEAD" 2>/dev/null || echo "0")
            CHANGELOG=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (\`%h\`)" --no-merges -10 2>/dev/null || true)
            if [ -n "$CHANGELOG" ]; then
              NOTES="${NOTES}## Changes since ${PREV_TAG}

          ${CHANGELOG}
          "
              if [ "$TOTAL_COMMITS" -gt 10 ]; then
                NOTES="${NOTES}
          ... and $((TOTAL_COMMITS - 10)) more
          "
              fi
              PREV_SHA=$(git rev-parse "${PREV_TAG}" 2>/dev/null || true)
              if [ -n "$PREV_SHA" ]; then
                NOTES="${NOTES}
          [Full changelog](https://github.com/synle/sqlui-native/compare/${PREV_TAG}...${TAG})
          "
              fi
            fi
          fi

          # 3. Install instructions at the bottom
          NOTES="${NOTES}## Install

          Download the appropriate file for your platform below. For detailed instructions, see the [installation guide](https://synle.github.io/sqlui-native/installation).

          | Platform | File |
          |----------|------|
          | macOS (Apple Silicon) | \`.dmg\` (aarch64) |
          | macOS (Intel) | \`.dmg\` (x64) |
          | Windows (x64) | \`.exe\` (NSIS installer) |
          | Linux (Debian/Ubuntu) | \`.deb\` |
          | Linux (AppImage) | \`.AppImage\` |"

          gh release create "$TAG" \
            --title "$TAG" \
            --notes "$NOTES" \
            $DRAFT_FLAGS

      - name: Create release job summary
        if: ${{ always() }}
        shell: bash
        run: |
          JOB_END=$(date +%s)
          DUR=$(( JOB_END - ${JOB_START:-$JOB_END} ))
          if [ "$DUR" -ge 60 ]; then FORMATTED=$(printf "%dm %ds" $((DUR / 60)) $((DUR % 60))); else FORMATTED="${DUR}s"; fi
          echo "## :rocket: Create Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Total Duration** | **${FORMATTED}** |" >> $GITHUB_STEP_SUMMARY

  build:
    needs: [code_format, create_release]
    if: ${{ always() && needs.code_format.result == 'success' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            artifact_name: macOS (Apple Silicon ARM64)
          - platform: macos-latest
            target: x86_64-apple-darwin
            artifact_name: macOS (Intel x64)
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: Windows (x64)
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_name: Linux (x64)

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Record build start time
        shell: bash
        run: echo "BUILD_START=$(date +%s)" >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libssl-dev

      - name: Install dependencies
        run: npm ci || npm install

      - name: Prepare sidecar resources
        run: mkdir -p src-tauri/resources && npm run build:tauri

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.target }}

      - name: Upload artifacts to release
        if: ${{ needs.create_release.outputs.dist_version != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ needs.create_release.outputs.dist_version }}"
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"

          for file in \
            "$BUNDLE_DIR"/dmg/*.dmg \
            "$BUNDLE_DIR"/nsis/*.exe \
            "$BUNDLE_DIR"/deb/*.deb \
            "$BUNDLE_DIR"/appimage/*.AppImage; do
            if [ -f "$file" ]; then
              echo "Uploading: $file"
              gh release upload "$TAG" "$file" --clobber
            fi
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
          retention-days: 30
          compression-level: 9
          if-no-files-found: ignore

      - name: Build job summary
        if: ${{ always() }}
        shell: bash
        run: |
          format_duration() {
            local s=$1
            if [ "${s:-0}" -ge 60 ]; then printf "%dm %ds" $((s / 60)) $((s % 60)); else printf "%ds" "${s:-0}"; fi
          }
          JOB_END=$(date +%s)
          TOTAL_DUR=$(( JOB_END - ${BUILD_START:-$JOB_END} ))
          echo "## :package: ${{ matrix.artifact_name }} Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Task | Duration |" >> $GITHUB_STEP_SUMMARY
          echo "|------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Total** | **$(format_duration $TOTAL_DUR)** |" >> $GITHUB_STEP_SUMMARY

  tests:
    needs: [code_format]
    if: ${{ always() && needs.code_format.result == 'success' }}
    uses: ./.github/workflows/integration-test.yml
    with:
      node_version: ${{ inputs.node_version || '24' }}
      run_e2e: true
      run_integration: ${{ inputs.run_integration }}
    secrets: inherit

  roll_back_on_failure_or_canceled:
    if: ${{ always() && inputs.release_mode == 'production' && needs.create_release.result == 'success' && (needs.tests.result == 'failure' || needs.build.result == 'failure' || needs.tests.result == 'cancelled' || needs.build.result == 'cancelled') }}
    needs: [create_release, tests, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Check release completeness and rollback if needed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ needs.create_release.outputs.dist_version }}"
          JOB_FAILED=${{ needs.tests.result == 'failure' || needs.build.result == 'failure' || needs.tests.result == 'cancelled' || needs.build.result == 'cancelled' }}

          if [ "$JOB_FAILED" = "true" ]; then
            echo "::warning::Release $TAG has failing jobs — deleting"
            gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true
            echo "ROLLED_BACK=true" >> $GITHUB_ENV
          elif [ "${{ inputs.release_mode }}" = "production" ]; then
            ASSET_COUNT=$(gh release view "$TAG" --json assets --jq '.assets | length' 2>/dev/null || echo "0")
            echo "Release $TAG has $ASSET_COUNT/$EXPECTED_RELEASE_ASSETS assets"
            if [ "$ASSET_COUNT" -lt "$EXPECTED_RELEASE_ASSETS" ]; then
              echo "::warning::Release $TAG is incomplete ($ASSET_COUNT/$EXPECTED_RELEASE_ASSETS assets) — deleting"
              gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true
              echo "ROLLED_BACK=true" >> $GITHUB_ENV
            else
              echo "Release $TAG is complete"
              echo "ROLLED_BACK=false" >> $GITHUB_ENV
            fi
          else
            echo "Release $TAG — skipping asset count check (non-production mode)"
            echo "ROLLED_BACK=false" >> $GITHUB_ENV
          fi

      - name: Rollback job summary
        if: ${{ always() }}
        shell: bash
        run: |
          echo "## :rewind: Release Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$ROLLED_BACK" = "true" ]; then
            echo "Rolled back release **${{ needs.create_release.outputs.dist_version }}** due to missing assets or job failure." >> $GITHUB_STEP_SUMMARY
          else
            echo "Release **${{ needs.create_release.outputs.dist_version }}** is complete with all expected assets." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Fail pipeline on rollback
        shell: bash
        run: |
          echo "::error::Release rolled back due to dist job failure or cancellation — failing the pipeline."
          exit 1

  publish:
    if: ${{ always() && inputs.release_mode == 'production' && needs.roll_back_on_failure_or_canceled.result == 'skipped' }}
    needs: [create_release, roll_back_on_failure_or_canceled, tests, build]
    runs-on: ubuntu-latest
    steps:
      - name: Record job start time
        run: echo "JOB_START=$(date +%s)" >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: "npm"


      - name: Publish release (un-draft and mark as latest)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ needs.create_release.outputs.dist_version }}"
          echo "Publishing release $TAG as official latest..."
          gh release edit "$TAG" --draft=false --latest
          echo "Release $TAG is now published and marked as latest"

      - name: Commit release version
        uses: EndBug/add-and-commit@v9
        with:
          message: "CI / CD - New Release ${{ needs.create_release.outputs.dist_version }}"
          default_author: github_actions

      - name: Publish job summary
        if: ${{ always() }}
        shell: bash
        run: |
          JOB_END=$(date +%s)
          DUR=$(( JOB_END - ${JOB_START:-$JOB_END} ))
          if [ "$DUR" -ge 60 ]; then FORMATTED=$(printf "%dm %ds" $((DUR / 60)) $((DUR % 60))); else FORMATTED="${DUR}s"; fi
          echo "## :bookmark: Publish Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | ${{ needs.create_release.outputs.dist_version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Total Duration** | **${FORMATTED}** |" >> $GITHUB_STEP_SUMMARY

  deploy_github_pages:
    if: ${{ always() && inputs.release_mode == 'production' && needs.publish.result == 'success' }}
    needs: [publish]
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Record job start time
        run: echo "JOB_START=$(date +%s)" >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Deploy job summary
        if: ${{ always() }}
        shell: bash
        run: |
          JOB_END=$(date +%s)
          DUR=$(( JOB_END - ${JOB_START:-$JOB_END} ))
          if [ "$DUR" -ge 60 ]; then FORMATTED=$(printf "%dm %ds" $((DUR / 60)) $((DUR % 60))); else FORMATTED="${DUR}s"; fi
          echo "## :globe_with_meridians: Deploy GitHub Pages Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Total Duration** | **${FORMATTED}** |" >> $GITHUB_STEP_SUMMARY
