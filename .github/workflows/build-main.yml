name: Main - Build

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or ref to build (leave empty for current branch)"
        required: false
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  code_format:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Run code formatting
        run: bash scripts/format.sh

      - name: Commit formatting changes
        if: github.event_name == 'push'
        uses: EndBug/add-and-commit@v9
        with:
          message: "CI / CD - Format code"
          default_author: github_actions

  tests:
    needs: [code_format]
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run prebuild
        run: npm run prebuild

      - name: Run unit tests
        run: npx vitest run --reporter=default --reporter=junit --outputFile.junit=unit-test-results.xml

      - name: Publish unit test results
        if: always()
        uses: dorny/test-reporter@v3
        with:
          name: Unit Test Results
          path: unit-test-results.xml
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

      - name: Run typecheck
        run: npm run typecheck

      - name: Run lint
        run: npm run lint

  build:
    needs: [code_format, tests]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            artifact_name: macOS (Apple Silicon ARM64)
          - platform: macos-latest
            target: x86_64-apple-darwin
            artifact_name: macOS (Intel x64)
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: Windows (x64)
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_name: Linux (x64)

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libssl-dev

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run Rust tests
        working-directory: src-tauri
        shell: bash
        run: |
          if [[ "${{ matrix.platform }}" == "windows-latest" ]]; then
            cargo test --target ${{ matrix.target }} --lib
          else
            cargo test --target ${{ matrix.target }}
          fi

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.target }}

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/rpm/*.rpm
          retention-days: 30
          compression-level: 9
          if-no-files-found: ignore

  pr_comment:
    if: github.event_name == 'pull_request'
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Post artifact links on PR
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });
            let body = `## Build Artifacts\n\n`;
            if (artifacts.data.artifacts.length === 0) {
              body += `No artifacts were produced.\n`;
            } else {
              body += `| Platform | Size | Download |\n|----------|------|----------|\n`;
              for (const a of artifacts.data.artifacts) {
                const sizeMB = (a.size_in_bytes / 1024 / 1024).toFixed(1);
                const downloadUrl = `${runUrl}/artifacts/${a.id}`;
                body += `| ${a.name} | ${sizeMB} MB | [Download](${downloadUrl}) |\n`;
              }
            }
            body += `\n[View full run](${runUrl})`;

            // Find and update existing comment or create new one
            const marker = '<!-- build-artifacts -->';
            body = marker + '\n' + body;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
