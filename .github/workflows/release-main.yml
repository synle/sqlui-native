name: Main - Release

on:
  workflow_dispatch:
    inputs:
      message:
        description: "Release notes"
      node_version:
        description: "Node.js version"
        default: "24"

permissions:
  contents: write
  pages: write
  id-token: write
  checks: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  create_release:
    runs-on: ubuntu-latest
    outputs:
      dist_version: ${{ steps.package-version.outputs.current-version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: "npm"

      - name: Stamp release version
        run: npm run version-stamp:release

      - name: Get package version
        id: package-version
        uses: martinbeentjes/npm-get-version-action@master

      - name: Delete existing tag and release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.package-version.outputs.current-version }}"
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.package-version.outputs.current-version }}"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "Release $TAG
          ${{ inputs.message }}"

  build_and_package:
    needs: [create_release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            bundles: nsis
            artifact_name: "Windows (Intel-AMD x64)"
          - os: windows-latest
            rust_target: aarch64-pc-windows-msvc
            bundles: nsis
            artifact_name: "Windows (ARM64)"
          - os: macos-latest
            rust_target: aarch64-apple-darwin
            bundles: dmg
            artifact_name: "macOS (Apple Silicon)"
          - os: macos-latest
            rust_target: x86_64-apple-darwin
            bundles: dmg
            artifact_name: "macOS (Intel x64)"
          - os: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            bundles: deb,rpm,appimage
            artifact_name: "Linux (x64)"
    runs-on: ${{ matrix.os }}
    steps:
      - name: Record job start time
        run: echo "JOB_START=$(date +%s)" >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: "npm"

      - name: Setup Python for node-gyp
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install setuptools for node-gyp
        run: python -m pip install setuptools

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install Linux dependencies
        if: ${{ runner.os == 'Linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libarchive-tools

      - name: Cache Cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-release-${{ runner.os }}-${{ matrix.rust_target }}-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Update package.json to release version
        if: ${{ needs.create_release.outputs.dist_version != '' }}
        run: npm version --no-git-tag-version "${{ needs.create_release.outputs.dist_version }}"

      - name: Install dependencies
        run: npm ci

      - name: Download Node.js binary for sidecar
        shell: bash
        env:
          NODE_VERSION: ${{ inputs.node_version }}
        run: bash scripts/download-node.sh ${{ matrix.rust_target }}

      - name: Build frontend and mocked-server
        run: npm run build:all

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ""
        with:
          tagName: ${{ needs.create_release.outputs.dist_version }}
          releaseName: ${{ needs.create_release.outputs.dist_version }}
          releaseBody: "Release ${{ needs.create_release.outputs.dist_version }}"
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.rust_target }} --bundles ${{ matrix.bundles }}

      - name: Job summary
        if: ${{ always() }}
        shell: bash
        run: |
          JOB_END=$(date +%s)
          DUR=$(( JOB_END - ${JOB_START:-$JOB_END} ))
          if [ "$DUR" -ge 60 ]; then FORMATTED=$(printf "%dm %ds" $((DUR / 60)) $((DUR % 60))); else FORMATTED="${DUR}s"; fi
          echo "## ${{ matrix.artifact_name }} Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Target | ${{ matrix.rust_target }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Bundles | ${{ matrix.bundles }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Total Duration** | **${FORMATTED}** |" >> $GITHUB_STEP_SUMMARY

  rollback_on_failure:
    if: ${{ always() && needs.create_release.result == 'success' && needs.build_and_package.result != 'success' }}
    needs: [create_release, build_and_package]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Delete incomplete release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.create_release.outputs.dist_version }}"
          echo "Rolling back release $TAG due to build failure"
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true

      - name: Fail pipeline
        run: |
          echo "::error::Release rolled back due to build failure"
          exit 1

  publish:
    if: ${{ always() && needs.build_and_package.result == 'success' }}
    needs: [create_release, build_and_package]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: "npm"

      - name: Update package.json to release version
        run: npm version --no-git-tag-version "${{ needs.create_release.outputs.dist_version }}"

      - name: Commit release version
        uses: EndBug/add-and-commit@v9
        with:
          message: "CI / CD - New Release ${{ needs.create_release.outputs.dist_version }}"
          default_author: github_actions

  deploy_github_pages:
    if: ${{ always() && needs.publish.result == 'success' }}
    needs: [publish]
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Generate release.json from latest official release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          LATEST_VERSION=$(gh release list --exclude-drafts --exclude-pre-releases --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || echo "")
          if [ -n "$LATEST_VERSION" ]; then
            echo "{ \"version\": \"$LATEST_VERSION\" }" > release.json
            echo "Generated release.json with version: $LATEST_VERSION"
          else
            echo "No official release found, skipping release.json generation"
          fi

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Copy release.json into site
        run: cp release.json _site/ 2>/dev/null || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Deploy job summary
        if: ${{ always() }}
        shell: bash
        run: |
          echo "## Deploy GitHub Pages Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Deployed to: ${{ steps.deploy.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
