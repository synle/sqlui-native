name: cleanup-releases

on:
  workflow_dispatch:
    inputs:
      cleanup_drafts:
        description: "Delete old draft releases"
        type: boolean
        default: true
      draft_keep_count:
        description: "Number of most recent draft releases to keep"
        type: number
        default: 0
      cleanup_incomplete:
        description: "Delete incomplete releases (missing assets)"
        type: boolean
        default: true
      expected_assets:
        description: "Expected number of assets per release"
        type: number
        default: 4
      lookback_months:
        description: "How many months back to check for incomplete releases"
        type: number
        default: 3
      dry_run:
        description: "Preview deletions without actually deleting"
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cleanup:
    # https://github.com/synle/gha-workflows/blob/main/.github/workflows/cleanup-releases.yml
    uses: synle/gha-workflows/.github/workflows/cleanup-releases.yml@main
    permissions:
      contents: write
    with:
      cleanup-drafts: ${{ inputs.cleanup_drafts }}
      draft-keep-count: ${{ inputs.draft_keep_count }}
      cleanup-incomplete: ${{ inputs.cleanup_incomplete }}
      expected-assets: ${{ inputs.expected_assets }}
      lookback-months: ${{ inputs.lookback_months }}
      dry-run: ${{ inputs.dry_run }}
