<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="SQLUI Native - A minimal Electron application for Databases" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/logo512.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>Loading...</title>
  </head>
  <body>
    <div id="body" style="background: #333">
      <style>
        /* A very subtle "breathing" effect */
        @keyframes breathe {
          0%,
          100% {
            opacity: 1;
          }
          50% {
            opacity: 0.85;
          }
        }

        @keyframes schema-search-flash {
          0%,
          100% {
            background-color: transparent;
          }
          25%,
          75% {
            background-color: rgba(25, 118, 210, 0.25);
          }
        }

        .schema-search-flash .Accordion__Header {
          animation: schema-search-flash 0.6s ease-in-out 3;
        }

        #initial-app-loader {
          display: flex;
          justify-content: center;
          align-items: center;
          position: absolute;
          top: 0;
          left: 0;
          right: 0;
          bottom: 0;
          margin: 0;
          padding: 0;
          background: #000 !important;
          color: #fff !important;
          font-family:
            system-ui,
            -apple-system,
            sans-serif !important;
          font-size: 60px !important;
          text-transform: uppercase;
          font-weight: bold;
          animation: breathe 2s ease-in-out infinite;
        }
      </style>

      <div id="initial-app-loader">Loading...</div>
      <noscript>You need to enable JavaScript to run this app.</noscript>
    </div>
    <script type="text/javascript" script-id="early-error-logger">
      // Capture early renderer errors to the debug log before React loads
      (function () {
        try {
          if (typeof require !== "function") return;
          var fs = require("fs");
          var nodePath = require("path");
          var electron = require("electron");
          var baseDir = nodePath.join(electron.app ? electron.app.getPath("appData") : require("os").homedir(), "sqlui-native");
          var logPath = nodePath.join(baseDir, "debug.log");
          window.__earlyLog = function (msg) {
            try {
              var ts = new Date().toISOString().replace("T", " ").slice(0, 23);
              fs.appendFileSync(logPath, "[" + ts + "] renderer:" + msg + "\n");
            } catch (e) {}
          };
          window.__earlyLog("init - renderer script starting");
          window.addEventListener("error", function (e) {
            if (window.__earlyLog) window.__earlyLog("error - " + e.message + " at " + e.filename + ":" + e.lineno);
          });
        } catch (_err) {
          // Not in Electron or require not available — skip
        }
      })();
    </script>
    <script type="text/javascript" script-id="suppress-resizer-error">
      // Suppress benign ResizeObserver loop errors
      var _origOnerror = window.onerror;
      window.onerror = function (msg) {
        if (typeof msg === "string" && msg.indexOf("ResizeObserver loop") > -1) return true;
        return _origOnerror ? _origOnerror.apply(this, arguments) : false;
      };
      window.addEventListener(
        "error",
        function (e) {
          if (e.message && e.message.indexOf("ResizeObserver loop") > -1) {
            e.stopImmediatePropagation();
            e.stopPropagation();
            e.preventDefault();
          }
        },
        true,
      );
    </script>
    <script type="text/javascript" script-id="preserve-electron-require">
      // Preserve Electron's require before ES modules load
      if (typeof window.require === "function") {
        window.requireElectron = window.require;
      }
    </script>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
