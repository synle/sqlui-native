<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="SQLUI Native - A cross-platform desktop SQL/NoSQL database client" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/logo512.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>Loading...</title>
  </head>
  <body>
    <div id="body" style="background: #333">
      <style>
        /* A very subtle "breathing" effect */
        @keyframes breathe {
          0%,
          100% {
            opacity: 1;
          }
          50% {
            opacity: 0.85;
          }
        }

        @keyframes schema-search-flash {
          0%,
          100% {
            background-color: transparent;
          }
          25%,
          75% {
            background-color: rgba(25, 118, 210, 0.25);
          }
        }

        .schema-search-flash .Accordion__Header {
          animation: schema-search-flash 0.6s ease-in-out 3;
        }

        #initial-app-loader {
          display: flex;
          justify-content: center;
          align-items: center;
          position: absolute;
          top: 0;
          left: 0;
          right: 0;
          bottom: 0;
          margin: 0;
          padding: 0;
          background: #000 !important;
          color: #fff !important;
          font-family:
            system-ui,
            -apple-system,
            sans-serif !important;
          font-size: 60px !important;
          text-transform: uppercase;
          font-weight: bold;
          animation: breathe 2s ease-in-out infinite;
        }
      </style>

      <div id="initial-app-loader">Loading...</div>
      <noscript>You need to enable JavaScript to run this app.</noscript>
    </div>
    <script type="text/javascript" script-id="suppress-resizer-error">
      // Suppress benign ResizeObserver loop errors
      var _origOnerror = window.onerror;
      window.onerror = function (msg) {
        if (typeof msg === "string" && msg.indexOf("ResizeObserver loop") > -1) return true;
        return _origOnerror ? _origOnerror.apply(this, arguments) : false;
      };
      window.addEventListener(
        "error",
        function (e) {
          if (e.message && e.message.indexOf("ResizeObserver loop") > -1) {
            e.stopImmediatePropagation();
            e.stopPropagation();
            e.preventDefault();
          }
        },
        true,
      );
    </script>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
